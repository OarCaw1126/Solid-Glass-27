name: Build DEB Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dpkg
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg

      - name: Build Rootless
        run: |
          mkdir -p RootlessBuild/DEBIAN
          mkdir -p RootlessBuild/var/jb/Library/Themes
          cp -r SolidGlass/Library/Themes/* RootlessBuild/var/jb/Library/Themes/
          
          cat <<EOC > RootlessBuild/DEBIAN/control
          Package: com.oarcaw1126.solidglass27
          Name: Solid Glass 27 (Rootless)
          Version: 1.5
          Architecture: iphoneos-arm64
          Maintainer: OarCaw1126
          Depends: com.spark.snowboard
          Section: Themes
          Description: Solid Glass 27 custom icon theme compilation for SnowBoard.
          EOC
          
          dpkg-deb --build RootlessBuild solidglass27_1.5_Rootless.deb

      - name: Build Rootful
        run: |
          mkdir -p RootfulBuild/DEBIAN
          mkdir -p RootfulBuild/Library/Themes
          cp -r SolidGlass/Library/Themes/* RootfulBuild/Library/Themes/
          
          cat <<EOC > RootfulBuild/DEBIAN/control
          Package: com.oarcaw1126.solidglass27
          Name: Solid Glass 27 (Rootful)
          Version: 1.5
          Architecture: all
          Maintainer: OarCaw1126
          Depends: com.spark.snowboard
          Section: Themes
          Description: Solid Glass 27 custom icon theme compilation for SnowBoard.
          EOC
          
          dpkg-deb --build RootfulBuild solidglass27_1.5_Rootful.deb

      - name: Build RootHide
        run: |
          mkdir -p RootHideBuild/DEBIAN
          mkdir -p RootHideBuild/var/jb/Library/Themes
          cp -r SolidGlass/Library/Themes/* RootHideBuild/var/jb/Library/Themes/
          
          cat <<EOC > RootHideBuild/DEBIAN/control
          Package: com.oarcaw1126.solidglass27.roothide
          Name: Solid Glass 27 (RootHide)
          Version: 1.5
          Architecture: iphoneos-arm64
          Maintainer: OarCaw1126
          Depends: com.spark.snowboard
          Section: Themes
          Description: Solid Glass 27 custom icon theme compilation for SnowBoard (RootHide version).
          EOC
          
          dpkg-deb --build RootHideBuild solidglass27_1.5_RootHide.deb

      - name: Upload Rootless DEB
        uses: actions/upload-artifact@v4
        with:
          name: solidglass27_1.5_Rootless.deb
          path: solidglass27_1.5_Rootless.deb

      - name: Upload Rootful DEB
        uses: actions/upload-artifact@v4
        with:
          name: solidglass27_1.5_Rootful.deb
          path: solidglass27_1.5_Rootful.deb

      - name: Upload RootHide DEB
        uses: actions/upload-artifact@v4
        with:
          name: solidglass27_1.5_RootHide.deb
          path: solidglass27_1.5_RootHide.deb
